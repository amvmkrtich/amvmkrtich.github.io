    function camelize(str){
        return str
            .split("-")
            .map( (value, index) => index === 0 ? value : value.charAt(0).toUpperCase() + value.substr(1) )
            .join("");
    }

    function filterRange(arr, min, max){
        return arr
        .filter(val => val <= max && val >= min);
    }

    function filterRangeInPlace(arr, min, max){
         arr.filter((val, index, array) => {
            if(min > val || val > max){
                array.splice(index, 1);
            }
        });

    }

    function copySorted(arr){

    function Calculator(){
        this.methods = {
            "+": (a, b) => a + b,
            "-": (a, b) => a - b,
        }
        this.calculate = function (str){
            let spl = str.split(" ");
            let [+a, op, +b] = spl;

            if(!this.methods[op] || isNaN(a) || isNaN(b)){
                return `The format should be "Number Operator Number`;
            }

            return  this.methods[op](a, b);
        }

        this.addMethod = function (name, func){
            return this.methods[name] = func;
        }
    }
